<!DOCTYPE html>
<html>
<head>
    <title>AI Chat</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="dark">

<div class="chat-container">

    <!-- Header -->
    <div class="chat-header">
        <span>🤖 AI Assistant</span>

        <!-- Theme Buttons -->
        <div class="theme-buttons">
            <button onclick="setTheme(event, 'dark')" class="active">🌙</button>
            <button onclick="setTheme(event, 'light')">☀️</button>
            <button onclick="setTheme(event, 'green')">🟢</button>
        </div>
    </div>

    <!-- Messages -->
    <div id="chat-box" class="chat-box"></div>

    <!-- Typing -->
    <div id="typing" class="typing hidden">Bot is typing...</div>

    <!-- Input -->
    <div class="input-area">
        <input id="user-input" placeholder="Ask anything..." />
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script src="/static/script.js"></script>
</body>
</html>
